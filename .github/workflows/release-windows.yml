# Ще компилира Windows .exe, качва го в GitHub Releases и обновява public/update.json
# (за авто-ъпдейт). Старт: Actions → "Release Windows" → Run workflow.
# ПРЕДИ: вдигни "version" в src-tauri/tauri.conf.json и в src-tauri/Cargo.toml на еднакви числа, commit, push.
name: Release Windows

on:
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Пълна история — иначе „git push“ в края често пада при shallow clone
          fetch-depth: 0

      - name: Get version
        id: version
        shell: pwsh
        run: |
          $j = Get-Content 'src-tauri/tauri.conf.json' -Raw -Encoding utf8 | ConvertFrom-Json
          "version=$($j.version)" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      # Vite вгражда VITE_* при build — без това .exe няма Supabase (същото като локален tauri build без .env)
      - name: Create .env
        shell: pwsh
        env:
          U: ${{ secrets.VITE_SUPABASE_URL }}
          P: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          A: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:U)) { throw "GitHub: Settings -> Secrets and variables -> Actions: задай VITE_SUPABASE_URL" }
          if ([string]::IsNullOrWhiteSpace($env:P)) { $pEmpty = $true } else { $pEmpty = $false }
          if ([string]::IsNullOrWhiteSpace($env:A)) { $aEmpty = $true } else { $aEmpty = $false }
          if ($pEmpty -and $aEmpty) { throw "Задай VITE_SUPABASE_PUBLISHABLE_KEY и/или VITE_SUPABASE_ANON_KEY" }
          $c = "VITE_SUPABASE_URL=" + $env:U + "`n"
          if (-not $pEmpty) { $c += "VITE_SUPABASE_PUBLISHABLE_KEY=" + $env:P + "`n" }
          if (-not $aEmpty) { $c += "VITE_SUPABASE_ANON_KEY=" + $env:A + "`n" }
          $c | Set-Content -Path .env -Encoding utf8

      - name: Install
        run: npm ci

      - name: Build
        env:
          RUST_BACKTRACE: 1
        run: npx tauri build

      - name: NSIS file
        id: nsis
        shell: pwsh
        run: |
          $d = "src-tauri/target/release/bundle/nsis"
          if (-not (Test-Path $d)) { $d = "src-tauri\target\release\bundle\nsis" }
          $exe = Get-ChildItem -Path $d -Filter "*_x64-setup.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $exe) { throw "NSIS .exe not found in bundle/nsis" }
          "path=$($exe.FullName -replace '\\','/')" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "name=$($exe.Name)" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          files: ${{ steps.nsis.outputs.path }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: public/update.json + push
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $v = "${{ steps.version.outputs.version }}"
          $tag = "v$v"
          $name = "${{ steps.nsis.outputs.name }}"
          $enc = [uri]::EscapeDataString($name)
          $url = "https://github.com/${{ github.repository }}/releases/download/${tag}/$enc"
          $o = [ordered]@{ version = $v; downloadUrl = $url; releaseNotes = "Release $tag" }
          ($o | ConvertTo-Json) | Set-Content -Path "public/update.json" -Encoding utf8
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/update.json
          if (git diff --staged --quiet) { exit 0 }
          git commit -m "chore: public/update.json for v$v"
          $ref = "${{ github.ref_name }}"
          git remote set-url origin "https://x-access-token:$env:GH_TOKEN@github.com/${{ github.repository }}.git"
          # Докато тече билдът, main може да е напреднал → push без rebase се отхвърля
          git fetch origin $ref
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          git rebase "origin/$ref"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          git push origin "HEAD:$ref"
